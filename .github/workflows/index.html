<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="Replace pay-and-display machines with a QR code. Drivers pay in 60 seconds. Revenue by 6 AM. £0 setup. £19/month."/>
<title>Aviparko — Cashless Parking Infrastructure</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;background:#FCFAF7;color:#1C1A18;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#D4CFC8;border-radius:3px}

/* ── COLOUR TOKENS ─────────────────────────────────────────────────────── */
:root{
  --cream:#FCFAF7;--cream2:#FAF8F5;--stone50:#FAFAF8;
  --ink:#1C1A18;--ink2:#3A3733;--ink3:#6B6760;--ink4:#A09C97;
  --border:#E8E4DE;--border2:#D4CFC8;
  --brg:#064E3B;--brg-mid:#059669;--brg-light:#D1FAE5;--brg-ring:#A7F3D0;
  --amber:#92400E;--amber-l:#FEF3C7;--amber-b:#FDE68A;
  --red:#991B1B;--red-l:#FEE2E2;--red-b:#FECACA;
  --vi:#3730A3;--vi-l:#EEF2FF;
}

/* ── ANIMATIONS ────────────────────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes ping2{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
@keyframes slideCount{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}

.anim-fade-up{animation:fadeUp .6s ease both}
.anim-fade-up-1{animation:fadeUp .6s .1s ease both}
.anim-fade-up-2{animation:fadeUp .6s .2s ease both}
.anim-fade-up-3{animation:fadeUp .6s .3s ease both}
.anim-fade-in{animation:fadeIn .3s ease both}
.anim-float{animation:float 6s ease-in-out infinite}
.anim-ping{animation:ping2 2.4s ease-in-out infinite}
.anim-spin{animation:spin .75s linear infinite}
.anim-pop{animation:pop .45s cubic-bezier(.16,1,.3,1) both}
.anim-count{animation:slideCount .4s ease both}

/* ── TYPOGRAPHY ────────────────────────────────────────────────────────── */
.f-syne{font-family:'Syne',sans-serif}
.f-mono{font-family:'DM Mono',monospace}
.hero-h{font-family:'Syne',sans-serif;font-weight:900;font-size:clamp(2.8rem,6vw,5.2rem);letter-spacing:-.065em;line-height:.86;color:var(--ink)}
.sec-h{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.9rem,3.8vw,3rem);letter-spacing:-.05em;line-height:.9;color:var(--ink)}
.sec-eye{font-family:'DM Mono',monospace;font-size:.6rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--brg-mid);display:block;margin-bottom:14px}

/* ── BUTTONS ────────────────────────────────────────────────────────────── */
.btn-dark{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:600;padding:13px 26px;border-radius:100px;transition:all .2s;letter-spacing:-.01em;white-space:nowrap;min-height:48px}
.btn-dark:hover{background:#2D2926;transform:scale(1.02)}
.btn-outline{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--ink);border:1.5px solid var(--border2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:500;padding:12px 24px;border-radius:100px;transition:all .2s;letter-spacing:-.01em;white-space:nowrap;min-height:48px}
.btn-outline:hover{background:#fff;border-color:var(--ink3)}
.btn-green{display:inline-flex;align-items:center;gap:8px;background:var(--brg);color:#fff;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:600;padding:13px 26px;border-radius:100px;transition:all .2s;letter-spacing:-.01em;white-space:nowrap;min-height:48px}
.btn-green:hover{background:#065f46;transform:scale(1.02)}

/* ── CARDS ──────────────────────────────────────────────────────────────── */
.card{background:#fff;border:1px solid var(--border);border-radius:16px}
.card-sm{background:#fff;border:1px solid var(--border);border-radius:12px}

/* ── TAGS ───────────────────────────────────────────────────────────────── */
.tag{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:.58rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:100px}
.tag-green{background:var(--brg-light);color:var(--brg);border:1px solid var(--brg-ring)}
.tag-amber{background:var(--amber-l);color:var(--amber);border:1px solid var(--amber-b)}
.tag-red{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.tag-ink{background:#F2F1EE;color:var(--ink2);border:1px solid var(--border)}

/* ── RANGE INPUT ────────────────────────────────────────────────────────── */
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:4px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--ink);border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer;transition:transform .15s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--ink);border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer}

/* ── FIELD ──────────────────────────────────────────────────────────────── */
input.f-inp{width:100%;background:#fff;border:1.5px solid var(--border2);border-radius:10px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--ink);outline:none;transition:border-color .2s}
input.f-inp:focus{border-color:var(--brg-mid)}
input.f-inp::placeholder{color:var(--ink4)}

/* ── PHONE FRAME ────────────────────────────────────────────────────────── */
.phone-shell{background:#1A1613;border-radius:40px;padding:3px;box-shadow:0 32px 64px rgba(0,0,0,.32),0 0 0 1px rgba(255,255,255,.07) inset}
.phone-inner{background:#0F0E0C;border-radius:38px;overflow:hidden}
.phone-notch{height:28px;background:#0F0E0C;display:flex;align-items:center;justify-content:center}
.phone-cam{width:8px;height:8px;border-radius:50%;background:#2A2826;border:1px solid #333}
.phone-screen{background:var(--cream);padding:16px 14px 18px}

/* ── ACCORDION ──────────────────────────────────────────────────────────── */
.acc-body{overflow:hidden;transition:max-height .35s ease,opacity .3s ease}
.acc-open{max-height:400px;opacity:1}
.acc-closed{max-height:0;opacity:0}

/* ── TIMELINE ───────────────────────────────────────────────────────────── */
.timeline-line{position:absolute;left:23px;top:48px;bottom:0;width:2px;background:linear-gradient(180deg,var(--brg-ring),transparent)}

/* ── NAV LINK ───────────────────────────────────────────────────────────── */
.nav-lnk{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:var(--ink3);padding:6px 13px;border-radius:8px;transition:all .15s}
.nav-lnk:hover{color:var(--ink);background:#F0EFEC}

/* ── SECTION SPACING ────────────────────────────────────────────────────── */
.sec-pad{padding:96px 24px}
.inner{max-width:1200px;margin:0 auto}

/* ── SHIMMER ────────────────────────────────────────────────────────────── */
.shimmer{background:linear-gradient(90deg,var(--brg-light) 25%,var(--brg-ring) 50%,var(--brg-light) 75%);background-size:200% auto;animation:shimmer 2.5s linear infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── RESPONSIVE ─────────────────────────────────────────────────────────── */
@media(max-width:1023px){
  .hero-grid{grid-template-columns:1fr!important}
  .how-grid{grid-template-columns:1fr!important}
  .feat-grid{grid-template-columns:1fr 1fr!important}
  .cta-grid{grid-template-columns:1fr!important}
  .roi-grid{grid-template-columns:1fr!important}
  .warden-grid{grid-template-columns:1fr!important}
  .compare-grid{grid-template-columns:1fr!important}
  .footer-grid{grid-template-columns:1fr 1fr!important}
}
@media(max-width:767px){
  .sec-pad{padding:56px 18px!important}
  .feat-grid{grid-template-columns:1fr!important}
  .footer-grid{grid-template-columns:1fr!important}
  .stats-grid{grid-template-columns:repeat(2,1fr)!important}
  .hero-btns{flex-direction:column;align-items:stretch!important}
  .hero-btns button{justify-content:center}
  .float-card{display:none!important}
  .phone-wrap{max-width:min(320px,90vw)!important;width:100%!important}
}
@media(max-width:479px){
  .feat-grid{grid-template-columns:1fr!important}
  .pricing-feats{grid-template-columns:1fr!important}
}

/* ── FIND PARKING / OVERLAY PANELS ───────────────────────────────────────── */
.overlay-backdrop{position:fixed;inset:0;z-index:1400;background:rgba(10,9,8,.65);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);animation:fadeIn .25s ease both}
.slide-panel{position:fixed;right:0;top:0;bottom:0;z-index:1401;background:#fff;width:min(480px,100vw);display:flex;flex-direction:column;box-shadow:-8px 0 48px rgba(0,0,0,.16);transform:translateX(0);animation:slideIn .35s cubic-bezier(.16,1,.3,1) both}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.panel-hd{padding:20px 24px;border-bottom:1px solid #E8E4DE;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:22px 24px}
.panel-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:.92rem;letter-spacing:-.04em;color:#1C1A18;display:flex;align-items:center;gap:7px}
.panel-close{width:32px;height:32px;border-radius:8px;border:1px solid #E8E4DE;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.panel-close:hover{background:#FAF8F5;border-color:#D4CFC8}
.panel-tabs{display:flex;border-bottom:1px solid #E8E4DE;flex-shrink:0}
.panel-tab{flex:1;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:#6B6760;padding:13px 12px;border-bottom:2px solid transparent;transition:all .18s}
.panel-tab.active{color:#1C1A18;border-bottom-color:#059669}

/* ── MOBILE BOTTOM NAV ────────────────────────────────────────────────────── */
#mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:990;background:rgba(252,250,247,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid #E8E4DE;padding:8px 12px 12px;gap:8px}
.mob-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;cursor:pointer;border-radius:12px;padding:8px 6px;min-height:56px;transition:background .15s;font-family:'DM Sans',sans-serif}
.mob-nav-btn:hover{background:#F0EFEC}
.mob-nav-btn.primary{background:#1C1A18;color:#fff}
.mob-nav-btn.primary:hover{background:#2D2926}
.mob-nav-btn .mnb-lbl{font-size:.6rem;font-weight:600;color:#6B6760;letter-spacing:.01em;margin-top:1px}
.mob-nav-btn.primary .mnb-lbl{color:rgba(255,255,255,.7)}

/* ── FIND PARKING PULSE BUTTON ───────────────────────────────────────────── */
.fp-pulse{position:relative;display:inline-flex;align-items:center;gap:7px}
.fp-pulse::before{content:'';position:absolute;inset:-4px;border-radius:100px;background:#D1FAE5;animation:pulsering 2s ease-in-out infinite;z-index:-1}
@keyframes pulsering{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:0;transform:scale(1.18)}}

/* ── OPERATOR LOGIN PANEL (dark) ──────────────────────────────────────────── */
.dark-panel{background:#1C1A18!important}
.dark-panel .panel-hd{border-bottom-color:rgba(255,255,255,.08)!important}
.dark-panel .panel-close{border-color:rgba(255,255,255,.12)!important;color:rgba(255,255,255,.6)!important}
.dark-panel .panel-close:hover{background:rgba(255,255,255,.06)!important}

/* ── MOBILE BODY PADDING (so content isn't behind sticky nav) ──────────────── */
@media(max-width:767px){
  #mob-nav{display:flex}
  body{padding-bottom:80px}
  .nav-mid-links{display:none!important}
  .nav-desktop-btns{display:none!important}
  .nav-mob-fp{display:flex!important}
}
@media(min-width:768px){
  .nav-mob-fp{display:none!important}
}

/* ── STEP EXPAND (Timeline) ─────────────────────────────────────────────── */
.step-expand{overflow:hidden;transition:max-height .38s cubic-bezier(.16,1,.3,1),opacity .3s ease}

/* ── TOAST NOTIFICATION ─────────────────────────────────────────────────── */
#toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:1500;background:#1C1A18;color:#fff;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:500;padding:10px 20px;border-radius:100px;box-shadow:0 8px 24px rgba(0,0,0,.25);pointer-events:none;transition:opacity .3s,transform .3s;opacity:0;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}


/* ── DRIVER GRID + COOKIE BANNER ──────────────────────────────────── */
@media(max-width:1023px){.driver-grid{grid-template-columns:1fr 1fr!important}}
@media(max-width:479px){.driver-grid{grid-template-columns:1fr!important}}
#avi-cookie{position:fixed;bottom:0;left:0;right:0;z-index:2000;background:#1C1A18;border-top:1px solid rgba(255,255,255,.1);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
@media(max-width:767px){#avi-cookie{bottom:80px}}
/* ── MOBILE RESPONSIVE FIXES ──────────────────────────────────────── */

/* Timeline 2-col collapses at tablet */
@media(max-width:1023px){
  .timeline-main-grid{grid-template-columns:1fr!important;gap:40px!important}
}

/* Pricing card sidebar, form field pairs, QR grid, legal bullets */
@media(max-width:767px){
  .pricing-main-grid{grid-template-columns:1fr!important}
  .form-pair{grid-template-columns:1fr!important}
  .dash-qr-grid{grid-template-columns:1fr!important}
  .legal-bullets{grid-template-columns:1fr!important}
}

/* Prevent any child element causing horizontal scroll */
.inner{min-width:0}
section{min-width:0}

/* Tighten section padding on small phones */
@media(max-width:479px){
  .sec-pad{padding:52px 16px!important}
  .sec-h{font-size:1.75rem!important}
  .hero-h{font-size:2.6rem!important}
}

/* Ensure buttons don't break layout */
@media(max-width:479px){
  .btn-dark,.btn-outline,.btn-green{
    white-space:normal!important;
    text-align:center;
    justify-content:center;
  }
}

/* Stats bar wraps cleanly */
@media(max-width:479px){
  .stats-grid{grid-template-columns:1fr 1fr!important}
}

/* ── GLOBAL OVERFLOW PROTECTION ───────────────────────────────────── */
p,h1,h2,h3,h4,li,span,a,button,label{overflow-wrap:break-word;word-break:break-word}
img,video,svg{max-width:100%;height:auto}

/* ── HERO: inline padding/gap — not covered by sec-pad rules ───────── */
@media(max-width:1023px){
  #hero{padding-top:72px!important;padding-bottom:48px!important}
  .hero-grid{gap:44px!important}
}
@media(max-width:767px){
  #hero{padding-left:20px!important;padding-right:20px!important;padding-top:64px!important}
  .hero-grid{gap:36px!important}
}
@media(max-width:479px){
  #hero{padding-left:14px!important;padding-right:14px!important;padding-top:56px!important;padding-bottom:36px!important}
  .hero-grid{gap:28px!important}
  .tag{font-size:.5rem!important;letter-spacing:.05em!important;padding:4px 10px!important}
}

/* ── SECTION CARDS: reduce large inline padding on mobile ──────────── */
@media(max-width:767px){
  .roi-panel{padding:28px 22px!important}
  .how-role-card{padding:26px 20px!important}
  .pricing-card-inner{padding:32px 24px!important}
  .cta-dark-inner{padding:28px 20px!important}
}
@media(max-width:479px){
  .roi-panel{padding:22px 16px!important}
  .how-role-card{padding:20px 16px!important}
  .pricing-card-inner{padding:26px 18px!important}
  .cta-dark-inner{padding:22px 16px!important}
}

/* ── STATS BAR: reduce extra internal padding on mobile ────────────── */
@media(max-width:767px){
  .stats-inner-pad{padding-left:0!important;padding-right:0!important}
}

/* ── THREE-ISSUE MOBILE FIX ───────────────────────────────────────── */

/* ROI big number scales down on mobile */
.roi-big-num{font-size:2.8rem;letter-spacing:-.06em}
@media(max-width:767px){.roi-big-num{font-size:2.2rem!important}}
@media(max-width:479px){.roi-big-num{font-size:1.9rem!important}}

/* ROI slider label row wraps on very small screens */
@media(max-width:479px){
  .roi-sl-row{flex-wrap:wrap!important;gap:4px!important}
  .roi-sl-row label{flex:1 1 100%}
}

/* Nav desktop buttons hidden on mobile (rule already exists, class now applied) */

/* ── FOUNDING OPERATOR BADGE: stack vertically on mobile ────────────
   Prevents the paragraph (flex:1) from being squeezed to near-zero
   width when the two action buttons (flexShrink:0) eat the row,
   which caused word-break to wrap text into a near-vertical column. */
@media(max-width:767px){
  .founding-badge{flex-direction:column!important;align-items:flex-start!important;gap:10px!important}
  .founding-badge-text{flex:none!important;width:100%!important}
  .founding-badge-actions{width:100%!important}
}
</style>
</head>

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.className = 'show';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 2200);
}
